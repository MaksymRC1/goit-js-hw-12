<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixabay Image Search</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📸 Image Gallery</h1>
        <p>Search millions of stunning images from Pixabay</p>

        <form class="form">
          <label>
            <input
              type="text"
              name="search-text"
              placeholder="Search images..."
              required
            />
          </label>
          <button type="submit">Search</button>
        </form>
      </header>

      <main>
        <!-- css-loader індикатор завантаження -->
        <div
          class="loader loader-default"
          data-text="Loading images..."
          blink
        ></div>

        <ul class="gallery"></ul>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
