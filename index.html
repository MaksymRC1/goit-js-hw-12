<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixabay Image Search</title>
    <script type="module" crossorigin src="/goit-js-hw-12/index.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-12/assets/vendor-BNWmCSUj.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/vendor-DLk4Dtzs.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/index-BEZPXldM.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📸 Image Gallery</h1>
        <p>Search millions of stunning images from Pixabay</p>

        <form class="form" id="search-form">
          <label>
            <input
              type="text"
              name="search-text"
              id="search-input"
              placeholder="Search images..."
              required
            />
          </label>
          <button type="submit">Search</button>
        </form>
      </header>

      <main>
        <ul class="gallery" id="gallery"></ul>

        <!-- Кнопка Load more -->
        <div class="load-more-wrapper">
          <button
            type="button"
            class="load-more"
            id="load-more-btn"
            style="display: none"
          >
            Load more
          </button>

          <!-- Індикатор завантаження під кнопкою -->
          <div
            class="loader loader-default"
            id="loader"
            style="display: none"
            data-text="Loading images..."
            blink
          ></div>
        </div>
      </main>
    </div>

  </body>
</html>
